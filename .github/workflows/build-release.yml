name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "僅編譯不發佈 (true/false)"
        required: false
        default: "false"
      tag:
        description: "要發版的 tag（例如 v1.2.3）；dry_run=false 時必填"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: nuget restore NCUT-Internet-Auto-Login.sln

      - name: Build GUI project (Release)
        run: |
          msbuild NCUT-Internet-Auto-Login\NCUT-Internet-Auto-Login.csproj `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:OutputPath=..\publish\ `
            /t:Rebuild `
            /v:minimal `
            /nologo

      - name: Publish Worker project (Release, self-contained exe)
        run: |
          dotnet publish NCUT-Internet-Auto-Login.Worker\NCUT-Internet-Auto-Login.Worker.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Resolve version for installer
        id: version
        run: |
          # Extract version from tag (strip leading 'v').
          # Falls back to "1.0.0" which must match the default in installer/setup.iss.
          $tag = if ("${{ github.ref_name }}" -match "^v") { "${{ github.ref_name }}" } `
                 elseif ("${{ github.event.inputs.tag }}" -match "^v") { "${{ github.event.inputs.tag }}" } `
                 else { "v1.0.0" }
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Compile Inno Setup installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/dMyAppVersion=${{ steps.version.outputs.VERSION }}" `
            "installer\setup.iss"

      # Upload all publish files + installer as a single artifact
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            publish/
            installer/dist/
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    # 只有在「推 tag」或「手動且 dry_run=false 且 tag 有填」時才做 release
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false' && github.event.inputs.tag != '')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package release assets
        run: |
          tag="${{ steps.tag.outputs.TAG }}"
          mkdir -p release
          # Zip all portable publish files
          (cd dist/publish && zip -r "../../release/NCUT-Internet-Auto-Login-portable-${tag}.zip" .)
          # Copy installer with versioned filename
          cp dist/installer/dist/NCUT-Internet-Auto-Login-Setup.exe \
             "release/NCUT-Internet-Auto-Login-Setup-${tag}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # workflow_dispatch 必須指定 tag_name；push tag 則可省略（但寫上也沒問題）
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
          files: release/*
          generate_release_notes: true

      - name: Update 'latest' tag
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs.tag
              : context.ref.replace('refs/tags/', '');

            // Resolve the tag object to a commit SHA
            const tagRef = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tagName}`
            });
            let sha = tagRef.data.object.sha;
            // If this is an annotated tag, dereference it to the commit
            if (tagRef.data.object.type === 'tag') {
              const annotated = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: sha
              });
              sha = annotated.data.object.sha;
            }

            // Force-update (or create) the 'latest' floating tag
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest',
                sha,
                force: true
              });
              core.info(`Updated 'latest' tag → ${sha}`);
            } catch (e) {
              if (e.status === 422) {
                // 422 means the ref doesn't exist yet — create it instead
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/latest',
                  sha
                });
                core.info(`Created 'latest' tag → ${sha}`);
              } else {
                throw e;
              }
            }
