name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "僅編譯不發佈 (true/false)"
        required: false
        default: "false"
      tag:
        description: "要發版的 tag（例如 v1.2.3）；dry_run=false 時必填"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore NuGet packages
        run: nuget restore NCUT-Internet-Auto-Login.sln

      - name: Build GUI project (Release)
        run: |
          msbuild NCUT-Internet-Auto-Login\NCUT-Internet-Auto-Login.csproj `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:OutputPath=..\publish\gui\ `
            /t:Rebuild `
            /v:minimal `
            /nologo

      - name: Publish Worker project (Release)
        run: |
          dotnet publish NCUT-Internet-Auto-Login.Worker\NCUT-Internet-Auto-Login.Worker.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish\worker

      # 讓你在 Actions 裡能下載 build 產物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            publish/gui/NCUT-Internet-Auto-Login.exe
            publish/worker/NCUT-Internet-Auto-Login.Worker.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    # 只有在「推 tag」或「手動且 dry_run=false 且 tag 有填」時才做 release
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false' && github.event.inputs.tag != '')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # workflow_dispatch 必須指定 tag_name；push tag 則可省略（但寫上也沒問題）
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
          files: |
            dist/NCUT-Internet-Auto-Login.exe
            dist/NCUT-Internet-Auto-Login.Worker.exe
          generate_release_notes: true
