name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages (GUI)
        run: nuget restore NCUT-Internet-Auto-Login\NCUT-Internet-Auto-Login.csproj -PackagesDirectory packages

      - name: Build GUI project (Release)
        run: |
          msbuild NCUT-Internet-Auto-Login\NCUT-Internet-Auto-Login.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /t:Rebuild `
            /v:minimal `
            /nologo

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Worker project (Release, self-contained)
        run: |
          dotnet publish NCUT-Internet-Auto-Login.Worker\NCUT-Internet-Auto-Login.Worker.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish\worker

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            NCUT-Internet-Auto-Login\bin\Release\NCUT-Internet-Auto-Login.exe
            publish\worker\NCUT-Internet-Auto-Login.Worker.exe
          generate_release_notes: true
